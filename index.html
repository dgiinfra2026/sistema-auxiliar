<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Alvorada</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background: #f4f4f4; color: #333; }
        .loader { border: 10px solid #f3f3f3; border-top: 10px solid #8e44ad; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #error-screen { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-retry { background: #8e44ad; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; font-weight: bold; width: 100%; }
        h2 { color: #8e44ad; }
        .alert-icon { font-size: 50px; color: #c0392b; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="main-screen">
        <h2>Acionando Ajuda...</h2>
        <p>Aguarde, capturando sua localização segura...</p>
        <div class="loader"></div>
    </div>

    <div id="error-screen">
        <div class="alert-icon">⚠️</div>
        <h2 style="color: #c0392b;">GPS OBRIGATÓRIO</h2>
        <p>Para sua segurança, o <strong>Botão Lilás</strong> só funciona com a localização ativada.</p>
        <p style="text-align: left; background: #fff3f3; padding: 15px; border-radius: 8px; font-size: 14px;">
            1. Ative o GPS do seu celular.<br>
            2. Clique no botão abaixo.<br>
            3. Permita o acesso à localização quando o navegador perguntar.
        </p>
        <button class="btn-retry" onclick="getLocation()">ATIVAR E TENTAR NOVAMENTE</button>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5551989670061";

        function getLocation() {
            // Volta para a tela de processamento
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('error-screen').style.display = 'none';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendDirectToWhatsapp, showForceError, {
                    enableHighAccuracy: true,
                    timeout: 8000 // Aguarda 8 segundos por um sinal preciso
                });
            } else {
                alert("Seu aparelho não suporta GPS.");
            }
        }

        function sendDirectToWhatsapp(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            // Link do Maps otimizado para mobile
            const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const message = encodeURIComponent(`🚨 *BOTÃO LILÁS - ALVORADA*\n\nESTOU EM PERIGO!\nMinha localização: ${mapsUrl}`);
            
            // PROTOCOLO NATIVO: Abre o app direto sem a tela de "Abrir App" do navegador
            window.location.href = `whatsapp://send?phone=${WHATSAPP_NUMBER}&text=${message}`;
        }

        function showForceError(error) {
            // Se falhar (usuário negou ou GPS off), trava na tela de erro
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('error-screen').style.display = 'block';
        }

        // Inicia a tentativa automática ao abrir a página
        window.onload = getLocation;
    </script>
</body>
</html>
