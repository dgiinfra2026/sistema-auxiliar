<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="refresh" content="0; url=callBottom.html/">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Redirecionando...</title>
    
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 80vh;
        }
        .spinner {
            border: 6px solid #f3f3f3;
            border-top: 6px solid #8e44ad;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #8e44ad;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="spinner"></div>

    <script>
        // 2. Redirecionamento via JavaScript (Backup para WebViews)
        // O setTimeout dá uma margem mínima para o HTML carregar antes de forçar a troca
        setTimeout(function() {
            window.location.replace("callBottom.html");
        }, 100);
    </script>
</body>
</html>
