<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoatendimento - Alvorada</title>
    <style>
        /* --- ESTILOS DO PORTAL --- */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; color: #333; height: 150vh; }
        .top-nav { background-color: #1e5631; color: white; padding: 10px 50px; display: flex; gap: 20px; font-size: 14px; }
        .header-main { background: white; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; }
        .logo-box { display: flex; align-items: center; gap: 15px; }
        .logo-box h1 { font-size: 22px; margin: 0; color: #444; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; text-align: center; }
        .welcome-text { color: #1e5631; font-weight: bold; margin-bottom: 30px; }
        .search-container { display: flex; max-width: 800px; margin: 0 auto 50px; }
        .search-input { flex: 1; padding: 15px; border: 1px solid #ccc; border-radius: 5px 0 0 5px; outline: none; }
        .search-btn { background: #27ae60; color: white; border: none; padding: 0 25px; border-radius: 0 5px 5px 0; cursor: pointer; }
        .perfis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 50px; }
        .perfil-card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #eee; text-align: center; }
        .icon { font-size: 30px; color: #27ae60; margin-bottom: 10px; }

        /* --- ANIMAÇÃO DE PULSAÇÃO --- */
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(142, 68, 173, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(142, 68, 173, 0); }
            100% { box-shadow: 0 0 0 0 rgba(142, 68, 173, 0); }
        }

        /* --- O BOTÃO LILÁS DE ALERTA --- */
        .btn-alerta-lilas {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 85px;
            height: 85px;
            background-color: #8e44ad; /* Lilás */
            border-radius: 50%;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 4px solid white;
            text-decoration: none;
            
            /* Aplica a animação de pulsação continuamente */
            animation: pulse-red 2s infinite;
        }

        /* Estilo do ícone de Alerta (Triângulo) */
        .btn-alerta-lilas svg {
            width: 45px;
            height: 45px;
            fill: white;
        }

        .btn-alerta-lilas:hover {
            transform: scale(1.1);
            background-color: #7d3c98;
            animation: none; /* Para de pulsar quando o mouse está em cima */
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <span>Início 🟢</span><span>Conteúdo 🟢</span><span>Busca 🟢</span>
    </div>

    <div class="header-main">
        <div class="logo-box">
            <div style="width: 40px; height: 50px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 8px;">BRASÃO</div>
            <div>
                <h1>AUTOATENDIMENTO</h1>
                <small>MUNICÍPIO DE ALVORADA</small>
            </div>
        </div>
    </div>

    <div class="container">
        <p class="welcome-text">SISTEMA DE APOIO AO CIDADÃO</p>

        <div class="search-container">
            <input type="text" class="search-input" placeholder="O que você procura?">
            <button class="search-btn">🔍</button>
        </div>

        <div class="perfis-grid">
            <div class="perfil-card"><div class="icon">👤</div>Cidadão</div>
            <div class="perfil-card"><div class="icon">💼</div>Trabalho</div>
            <div class="perfil-card"><div class="icon">🏘️</div>Urbanismo</div>
            <div class="perfil-card"><div class="icon">📈</div>Fazenda</div>
        </div>
    </div>

    <a href="whatsapp.html" class="btn-alerta-lilas" title="PEDIR SOCORRO">
        <svg viewBox="0 0 24 24">
            <path d="M12,2L1,21H23L12,2M12,6L19.53,19H4.47L12,6M11,10V14H13V10H11M11,16V18H13V16H11Z" />
        </svg>
    </a>

</body>
</html>
