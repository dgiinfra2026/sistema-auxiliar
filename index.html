<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Alvorada</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f4f4; }
        .loader { border: 16px solid #f3f3f3; border-top: 16px solid #8e44ad; border-radius: 50%; width: 60px; height: 60px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h2>Acionando Ajuda...</h2>
    <p>Aguarde, capturando sua localização segura...</p>
    <div class="loader"></div>

    <script>
        const WHATSAPP_NUMBER = "5551989670061";

        window.onload = function() {
            if (navigator.geolocation) {
                // Solicita alta precisão (GPS)
                navigator.geolocation.getCurrentPosition(redirectToWhatsApp, showError, {
                    enableHighAccuracy: true,
                    timeout: 5000 // 5 segundos
                });
            } else {
                alert("Erro de localização. Realize o procedimento no botão novamente.");
            }
        };

        function redirectToWhatsApp(position) {
            const lat = position.coords.latitude; // capturando as latitude (x)
            const lon = position.coords.longitude; // capturando longitude (y)
            const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
            
            // Monta a mensagem para o wa.me
            const message = encodeURIComponent(`🚨 *BOTÃO LILÁS - ALVORADA*\nESTOU EM PERIGO!\nMinha localização: ${mapsUrl}`);
            
            // Redireciona para o WhatsApp
            window.location.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
        }

        function showError(error) {
            // Se o GPS falhar, envia pelo menos o alerta sem coordenadas
            const message = encodeURIComponent(`🚨 *BOTÃO LILÁS - ALVORADA*\nESTOU EM PERIGO! (GPS desativado)`);
            window.location.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
        }
    </script>
</body>
</html>
