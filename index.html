<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Alvorada</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px 20px; background: #f4f4f4; color: #333; }
        .loader { border: 10px solid #f3f3f3; border-top: 10px solid #8e44ad; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #error-screen { display: none; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-retry { background: #8e44ad; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 20px; font-weight: bold; }
        h2 { color: #8e44ad; }
    </style>
</head>
<body>

    <div id="main-screen">
        <h2>Acionando Ajuda...</h2>
        <p id="status-text">Aguarde, capturando sua localização segura...</p>
        <div class="loader"></div>
    </div>

    <div id="error-screen">
        <h2 style="color: #c0392b;">GPS Necessário</h2>
        <p>Não conseguimos obter sua localização. Para sua segurança, o Botão Lilás precisa saber onde você está.</p>
        <p><strong>Por favor:</strong><br>1. Ative o GPS do celular.<br>2. Autorize o uso da localização quando solicitado.</p>
        <button class="btn-retry" onclick="getLocation()">Tentar Novamente</button>
    </div>

    <script>
        const WHATSAPP_NUMBER = "5551989670061";

        function getLocation() {
            // Reseta a interface para o estado de carregamento
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('error-screen').style.display = 'none';
            document.getElementById('status-text').innerText = "Tentando capturar localização novamente...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(redirectToWhatsApp, showError, {
                    enableHighAccuracy: true,
                    timeout: 10000 // Aumentado para 10s para dar tempo do sinal GPS estabilizar
                });
            } else {
                alert("Seu navegador não suporta geolocalização.");
            }
        }

        function redirectToWhatsApp(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
            
            const message = encodeURIComponent(`🚨 *BOTÃO LILÁS - ALVORADA*\nESTOU EM PERIGO!\nMinha localização: ${mapsUrl}\n\n(Por favor, ative a localização em tempo real no WhatsApp agora)`);
            
            window.location.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${message}`;
        }

        function showError(error) {
            // Esconde o carregamento e mostra a tela de erro forçando a ação
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('error-screen').style.display = 'block';
        }

        // Inicia a tentativa automática ao carregar
        window.onload = getLocation;
    </script>
</body>
</html>
